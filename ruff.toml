target-version = "py311"
line-length = 100

[lint]
select = ["ALL"]
ignore = [
    "D",       # pydocstyle
    "ANN",     # flake8-annotations
    "TRY003",  # avoid long exception messages
    "EM101",   # exception must not use string literal
    "EM102",   # exception must not use f-string
    "TC001",   # type-checking block for application imports
    "TC003",   # type-checking block for stdlib imports
    "COM812",  # trailing comma (handled by formatter)
    "FBT001",  # boolean positional arg
    "FBT002",  # boolean default positional arg
    "T201",    # print (CLI uses print for user-facing output)
    "E501",    # line-too-long (formatter handles wrapping; noisy in lint)
    "PLC0415", # import-outside-top-level (intentional lazy imports avoid circular deps)
    "S603",    # subprocess-without-shell (false positive in service management)
    "S607",    # start-process-with-partial-path (launchctl/systemctl by design)
    "S608",    # hardcoded-sql-expression (false positive on parameterized queries)
    "S110",    # try-except-pass (intentional graceful handling)
    "BLE001",  # blind-except (intentional in top-level/CLI handlers)
    "SIM105",  # suppressible-exception (stylistic; try/except/pass is clearer here)
    "C901",    # complex-structure (noise; refactoring out of scope)
    "PLR0912", # too-many-branches (noise)
    "PLR0913", # too-many-arguments (noise)
    "PLR0915", # too-many-statements (noise)
    "PLR2004", # magic-value-comparison (noise; test-friendly constants)
    "PERF401", # manual-list-comprehension (hurts readability of complex appends)
    "RUF005",  # collection-literal-concatenation (stylistic; `args + tuple` is clear)
    "FURB162", # fromisoformat-replace-z (explicit Z-handling is fine, broad-compat)
]

[lint.isort]
known-first-party = ["skillloop"]

[format]
line-ending = "lf"
quote-style = "double"
indent-style = "space"

[lint.extend-per-file-ignores]
"skillloop/fs_safety.py" = [
    "PTH101",  # os.chmod — intentional on tempfile.mkstemp str paths for atomic writes
    "PTH105",  # os.replace — intentional atomic replace on str paths
    "PTH108",  # os.unlink — intentional cleanup of tempfile str paths
]
"tests/**" = [
    "S101",
    "S603",
    "S607",
    "PLR2004",
    "ARG001",
    "ARG002",
    "FBT001",
    "FBT002",
    "INP001",
    "PT011",
    "PT012",
    "PT017",
    "PT018",
    "SLF001",
    "N818",
    "S105",
    "PTH116",
    "PLC0415",
    "E501",
]
