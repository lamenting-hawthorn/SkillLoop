name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff check
        run: python -m ruff check .
      - name: MyPy (typed boundaries)
        run: python -m mypy skillloop/errors.py skillloop/conditions.py skillloop/policy.py skillloop/schema.py skillloop/ports/service_manager.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Run tests with coverage
        run: python -m pytest tests/ -q --cov=skillloop --cov-report=term
      - name: Compile check
        run: python -m compileall skillloop tests -q
      - name: Packaging check
        run: python -m pip wheel . --no-deps -w /tmp/skillloop-wheel-check
      - name: Clean wheel install
        run: |
          python -m venv /tmp/skillloop-wheel-venv
          /tmp/skillloop-wheel-venv/bin/python -m pip install /tmp/skillloop-wheel-check/*.whl
          cd /tmp
          /tmp/skillloop-wheel-venv/bin/skillloop --version
          /tmp/skillloop-wheel-venv/bin/python -m skillloop --help
      - name: Smoke test CLI workflow
        run: |
          tmp=$(mktemp -d)
          cp -R examples "$tmp/"
          python -m skillloop.cli --path "$tmp" init
          python -m skillloop.cli --path "$tmp" ingest generic "$tmp/examples/traces/simple_trace.jsonl"
          python -m skillloop.cli --path "$tmp" traces list
          python -m skillloop.cli --path "$tmp" eval latest
          python -m skillloop.cli --path "$tmp" distill latest
          python -m skillloop.cli --path "$tmp" review list --verbose
          python -m skillloop.cli --path "$tmp" export sft --out "$tmp/sft.jsonl"
          test -s "$tmp/sft.jsonl"
